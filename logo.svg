    <path d="M83 70C72 58 82 44 94 32C105 49 102 63 90 74" stroke="#F05A42" stroke-width="9" stroke-linecap="round"/>
    <path d="M111 70C101 56 112 42 126 29C138 49 132 65 119 76" stroke="#FFB347" stroke-width="9" stroke-linecap="round"/>
    <path d="M125 62C129 40 151 37 165 45C158 65 142 77 125 62Z" fill="url(#leafGradient)"/>
