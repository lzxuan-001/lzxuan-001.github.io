<svg width="720" height="180" viewBox="0 0 720 180" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">食物网站 Logo</title>
  <desc id="desc">A warm food website logo with a bowl, leaf, steam, and Chinese wordmark.</desc>
  <defs>
    <linearGradient id="bowlGradient" x1="49" y1="124" x2="161" y2="124" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F05A42"/>
      <stop offset="1" stop-color="#FFB347"/>
    </linearGradient>
    <linearGradient id="leafGradient" x1="107" y1="35" x2="149" y2="81" gradientUnits="userSpaceOnUse">
      <stop stop-color="#37A86B"/>
      <stop offset="1" stop-color="#9ACD32"/>
    </linearGradient>
    <filter id="softShadow" x="17" y="8" width="176" height="160" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feFlood flood-opacity="0" result="BackgroundImageFix"/>
